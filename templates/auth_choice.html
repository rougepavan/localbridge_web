<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - LocalBridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="/static/css/main.css" rel="stylesheet">
    <link href="/static/css/premium-ui.css" rel="stylesheet">
    <style>
      .choice-bg {
        background: radial-gradient(circle at top left, #1e1b4b 0%, #020617 100%);
        min-height: 100dvh;
        width: 100vw;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      
      .auth-card {
        width: 100%;
        max-width: 460px;
        padding: 3rem;
        border-radius: 1.5rem;
        text-align: center;
        z-index: 10;
      }
      
      .hero-title {
        color: white;
        font-size: 2.25rem;
        font-weight: 800;
        line-height: 1.2;
        margin-bottom: 1rem;
        letter-spacing: -0.03em;
      }

      .hero-subtitle {
        color: #94a3b8;
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 3rem;
      }

      .btn-choice {
        width: 100%;
        padding: 1.25rem;
        border-radius: 1rem;
        font-weight: 600;
        font-size: 1.05rem;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-decoration: none;
      }

      .btn-signup {
        background: var(--prem-gradient-1);
        color: white;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.4);
      }
      .btn-signup:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 20px 35px -5px rgba(236, 72, 153, 0.6);
      }

      .btn-login {
        background: rgba(255,255,255,0.05);
        color: white;
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
      }
      .btn-login:hover {
        background: rgba(255,255,255,0.1);
        transform: translateY(-3px);
      }

    </style>
</head>
<body class="choice-bg">
    
    <!-- Background mesh blobs -->
    <div class="blob blob-1" style="background: #4f46e5; opacity: 0.2;"></div>
    <div class="blob blob-2" style="background: #ec4899; opacity: 0.2; bottom: 0;"></div>

    <div class="auth-card premium-glass-dark reveal-up">
        <div class="flex justify-center mb-6 reveal-scale">
            <div class="w-16 h-16 rounded-2xl bg-indigo-600/20 border border-indigo-500/30 flex items-center justify-center text-indigo-400">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                    <path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                </svg>
            </div>
        </div>

        <h1 class="hero-title reveal-fade">Discover your local marketplace.</h1>
        <p class="hero-subtitle reveal-fade">Join the network to find, share, and exchange items safely within your community.</p>
        
        <div class="space-y-4">
            <a href="/signup" class="btn-premium btn-premium-indigo w-full py-4 text-white font-bold reveal-up">
                Create Account
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
            
            <a href="/login" class="btn-premium w-full py-4 text-white font-bold reveal-up bg-white/5 border border-white/10 backdrop-blur-md hover:bg-white/10">
                Log In
            </a>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/animations.js"></script>
</body>
</html>
