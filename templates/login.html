<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LocalBridge</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="/static/css/main.css" rel="stylesheet">
    <style>
        .input-icon-group { position: relative; }
        .input-icon-group .field-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            pointer-events: none;
            z-index: 2;
        }
        .input-icon-group .floating-input { padding-left: 2.75rem !important; }
        .input-icon-group .floating-label { left: 2.75rem !important; }
        .eye-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            z-index: 2;
            background: none;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
        }
        .eye-toggle:hover { color: #4f46e5; }
    </style>
</head>
<body class="mesh-bg">
    <div class="auth-wrapper bg-transparent">
        <div class="auth-left">
            <div class="auth-left-bg reveal-fade" style="background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%); background-image: url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&q=80'); background-size: cover; background-blend-mode: overlay;"></div>
            <div class="auth-brand-content">
                <div class="auth-brand-icon reveal-scale">
                    <!-- Loop/Exchange Icon -->
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 1l4 4-4 4"/>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                        <path d="M7 23l-4-4 4-4"/>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                    </svg>
                </div>
                <h1 class="reveal-up">Welcome back<br>to <span class="text-gradient">LocalBridge</span></h1>
                <p class="reveal-up">Access your community network.<br>Discover, share, and exchange items locally.</p>
            </div>
        </div>

        <div class="auth-right relative">
            <div class="auth-form-container premium-glass rounded-3xl p-10 reveal-scale">
                <div class="auth-header">
                    <div class="lg:hidden flex items-center gap-2 mb-6 font-bold text-xl text-indigo-600">
                        <!-- Loop icon for mobile -->
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                            <path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                        </svg>
                        LocalBridge
                    </div>
                    <h2 class="auth-title">Log in</h2>
                    <p class="auth-subtitle">New to LocalBridge? <a href="/signup" class="auth-link">Create an account</a></p>
                </div>

                <form id="login-form">
                    <!-- Email Field with Icon -->
                    <div class="floating-group input-icon-group reveal-up">
                        <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" id="email" name="email" class="floating-input text-sm" placeholder=" " required maxlength="150">
                        <label class="floating-label" for="email">Email address</label>
                    </div>

                    <!-- Password Field with Icon + Eye Toggle -->
                    <div class="floating-group input-icon-group reveal-up">
                        <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" name="password" class="floating-input text-sm" placeholder=" " required maxlength="128" style="padding-right: 3rem;">
                        <label class="floating-label" for="password">Password</label>
                        <button type="button" class="eye-toggle" id="eyeToggle" onclick="togglePasswordVisibility()" title="Show/Hide password">
                            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>

                    <div class="flex items-center justify-between mb-8 mt-2 reveal-up">
                        <label class="checkbox-container">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="/forgot-password" class="auth-link font-medium" style="font-size: 0.875rem;">Forgot password?</a>
                    </div>

                    <div class="reveal-up">
                        <button type="submit" class="btn-premium btn-premium-indigo w-full py-3.5 magnetic-btn text-white" id="loginBtn">
                            <span class="flex items-center justify-center gap-2">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                                    <polyline points="10 17 15 12 10 7"/>
                                    <line x1="15" y1="12" x2="3" y2="12"/>
                                </svg>
                                Sign In to Dashboard
                            </span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/animations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            ValidationHelper.attach('email', 'email');
            ValidationHelper.attach('password', 'required'); // Just required for login

            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get('email');
            if (emailParam) {
                const emailInput = document.getElementById('email');
                emailInput.value = emailParam;
                // Add class to label if needed, though floating label should handle it if value is set
                emailInput.dispatchEvent(new Event('input', { bubbles: true }));
            }
        });

        function togglePasswordVisibility() {
            const pw = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            const isHidden = pw.type === 'password';
            pw.type = isHidden ? 'text' : 'password';
            icon.innerHTML = isHidden
                ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`
                : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value;
            
            // Frontend Validation
            const validation = validateEmailString(email);
            if (!validation.isValid) {
                showToast(validation.message, 'error');
                return;
            }

            btn.innerHTML = '<span class="animate-pulse">Authenticating...</span>';
            try {
                const res = await submitApiForm(e.target, '/login', 'POST');
                if(res.success) {
                    AppState.setUser({ id: res.userId, email: email });
                    showToast('Login successful', 'success');

                    gsap.to('.auth-form-container', { y: -50, opacity: 0, duration: 0.5, ease: "power2.in" });
                    setTimeout(() => window.location.href = '/dashboard', 600);
                } else {
                    if (res.notRegistered) {
                        showToast('Email not found. Redirecting to signup...', 'error');
                        setTimeout(() => window.location.href = `/signup?email=${encodeURIComponent(email)}`, 1500);
                    } else {
                        showToast(res.message || 'Login failed', 'error');
                        btn.innerHTML = '<span class="flex items-center justify-center gap-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Sign In to Dashboard</span>';
                    }
                }
            } catch (err) {
                showToast('Error connecting to server', 'error');
                btn.innerHTML = '<span class="flex items-center justify-center gap-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Sign In to Dashboard</span>';
            }
        });
    </script>
</body>
</html>
