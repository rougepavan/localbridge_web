<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - LocalBridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="/static/css/main.css" rel="stylesheet">
    <link href="/static/css/auth.css" rel="stylesheet">
    <link href="/static/css/premium-ui.css" rel="stylesheet">
</head>
<body class="mesh-bg">
    <div class="auth-wrapper bg-transparent">
        <div class="auth-left">
            <div class="auth-left-bg reveal-fade" style="background-image: url('https://images.unsplash.com/photo-1549465220-1a8b9238cb28?auto=format&fit=crop&q=80');"></div>
            <div class="auth-brand-content">
                <div class="auth-brand-icon reveal-scale">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                        <path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                    </svg>
                </div>
                <h1 class="reveal-up">Join the<br><span class="text-gradient">LocalBridge</span> network</h1>
                <p class="reveal-up">Connect with your neighbors to discover, share, and exchange items easily. A sustainable way to trade locally.</p>
            </div>
        </div>

        <div class="auth-right relative">
            <div class="auth-form-container premium-glass rounded-3xl p-10 reveal-scale" style="max-width: 480px;">
                <div class="auth-header">
                    <div class="lg:hidden flex items-center gap-2 mb-6 font-bold text-xl text-indigo-600">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                            <path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                        </svg>
                        LocalBridge
                    </div>
                    <h2 class="auth-title">Create account</h2>
                    <p class="auth-subtitle">Already have an account? <a href="/login" class="auth-link">Log in</a></p>
                </div>

                <form id="signup-form">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="floating-group reveal-up">
                            <input type="text" id="name" name="name" class="floating-input" placeholder=" " required pattern="^[a-zA-Z\s]+$" title="Please enter a valid name" maxlength="100">
                            <label class="floating-label" for="name">Full Name</label>
                        </div>
                        <div class="floating-group reveal-up">
                            <input type="text" id="location" name="location" class="floating-input" placeholder=" " required pattern="^[a-zA-Z\s,]+$" title="Please enter a valid city or area" maxlength="200">
                            <label class="floating-label" for="location">City / Area</label>
                        </div>
                    </div>

                    <div class="floating-group reveal-up">
                        <input type="email" id="email" name="email" class="floating-input" placeholder=" " required maxlength="150" pattern="^[a-zA-Z0-9._%+\-]+@(gmail\.com|yahoo\.com|outlook\.com|hotmail\.com|icloud\.com|protonmail\.com)$" title="Please enter a supported public email (e.g. @gmail.com)">
                        <label class="floating-label" for="email">Email address</label>
                    </div>
                    
                    <div class="floating-group relative reveal-up">
                        <input type="password" id="password" name="password" class="floating-input !bg-transparent pr-12" placeholder=" " required minlength="8" maxlength="128" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*(),.?&quot;:{}|<>\s]).{8,}" title="Please enter a stronger password (8+ chars, mix of case, number &amp; special char)">
                        <label class="floating-label" for="password">Password</label>
                        <button type="button" onclick="togglePasswordVisibility(this, 'password')" class="absolute top-1/2 -translate-y-1/2 right-3 p-2 hover:bg-slate-100 rounded-lg transition-colors z-10">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>

                    <div id="otp-container" class="floating-group reveal-up hidden transition-all duration-500 overflow-hidden">
                        <input type="text" id="otp" name="otp" class="floating-input border-indigo-400 bg-indigo-50/30" placeholder=" " maxlength="4" pattern="^\d{4}$" title="Please enter a valid 4-digit verification code">
                        <label class="floating-label text-indigo-600" for="otp">Enter 4-Digit Verification Code</label>
                    </div>

                    <p class="text-xs text-slate-500 mb-6 mt-2 reveal-up">By continuing, you agree to LocalBridge's Terms of Service and Privacy Policy.</p>

                    <div class="reveal-up">
                        <button type="submit" class="btn-premium btn-premium-indigo w-full py-3.5 magnetic-btn text-white">Create Free Account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/animations.js"></script>
    <script>
        let isOtpSent = false;

        document.getElementById('email').addEventListener('blur', async (e) => {
            const email = e.target.value;
            if (!email || !email.includes('@')) return;
            
            try {
                const res = await fetch(`/check-email?email=${encodeURIComponent(email)}`);
                const data = await res.json();
                if (data.exists) {
                    showToast('Account detected! Redirecting you to login...', 'info');
                    setTimeout(() => {
                        window.location.href = `/login?email=${encodeURIComponent(email)}`;
                    }, 800);
                }
            } catch (err) {}
        });

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const locationStr = document.getElementById('location').value;

            // Name Validation (Alphabets and spaces only)
            if (!/^[a-zA-Z\s]+$/.test(name)) {
                showToast('Please enter a valid name.', 'error');
                return;
            }

            // Location Validation (Alphabets, spaces, and commas only)
            if (!/^[a-zA-Z\s,]+$/.test(locationStr)) {
                showToast('Please enter a valid city or area.', 'error');
                return;
            }

            if (!isOtpSent) {
                // Step 1: Send OTP
                const validation = validateEmailString(email);
                if (!validation.isValid) {
                    showToast(validation.message, 'error');
                    return;
                }

                // Password constraints validation
                const hasCapital = /[A-Z]/.test(password);
                const hasSmall = /[a-z]/.test(password);
                const hasNumber = /\d/.test(password);
                const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);
                if (password.length < 8 || !hasCapital || !hasSmall || !hasNumber || !hasSpecial) {
                    showToast('Please enter a stronger password (8+ chars, mix of case, number & special char).', 'error');
                    return;
                }

                btn.innerHTML = 'Sending Code...';
                try {
                    const res = await fetch('/send-signup-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const data = await res.json();
                    if (data.success) {
                        showToast(data.message, 'success');
                        isOtpSent = true;
                        document.getElementById('otp-container').classList.remove('hidden');
                        btn.innerHTML = 'Verify & Create Account';
                        
                        // Disable email/pass to prevent changes during OTP
                        document.getElementById('email').readOnly = true;
                        document.getElementById('password').readOnly = true;
                        gsap.from('#otp-container', { height: 0, opacity: 0, duration: 0.5 });
                    } else {
                        showToast(data.message || 'Failed to send OTP', 'error');
                        btn.innerHTML = 'Create Free Account';
                    }
                } catch (err) {
                    showToast('Network error', 'error');
                    btn.innerHTML = 'Create Free Account';
                }
            } else {
                // Step 2: Verify OTP and Register
                const otp = document.getElementById('otp').value;
                if (!otp || otp.length < 4) {
                    showToast('Please enter the 4-digit verification code', 'error');
                    return;
                }

                btn.innerHTML = 'Verifying...';
                const formData = new FormData(e.target);
                const payload = Object.fromEntries(formData.entries());

                try {
                    const res = await fetch('/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (data.success) {
                        AppState.setUser({ id: data.userId, email: email });
                        showToast('Account created successfully!', 'success');
                        gsap.to('.auth-form-container', { scale: 0.9, opacity: 0, duration: 0.5, ease: "power2.in" });
                        setTimeout(() => window.location.href = '/dashboard', 600);
                    } else {
                        showToast(data.message || 'Signup failed', 'error');
                        btn.innerHTML = 'Verify & Create Account';
                    }
                } catch (err) {
                    showToast('Network error', 'error');
                    btn.innerHTML = 'Verify & Create Account';
                }
            }
        });
    </script>
</body>
</html>
