<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - LocalBridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="/static/css/main.css" rel="stylesheet">
    <link href="/static/css/auth.css" rel="stylesheet">
    <link href="/static/css/premium-ui.css" rel="stylesheet">
</head>
<body class="mesh-bg">
    <div class="auth-wrapper bg-transparent">
        <div class="auth-left">
            <div class="auth-left-bg reveal-fade" style="background-image: url('https://images.unsplash.com/photo-1555685812-4b943f1cb0eb?auto=format&fit=crop&q=80');"></div>
            <div class="auth-brand-content">
                <div class="auth-brand-icon reveal-scale">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                        <path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                    </svg>
                </div>
                <h1 class="reveal-up">Secure password recovery</h1>
                <p class="reveal-up">Don't worry, it happens to the best of us. Let's get your account securely recovered so you can keep exchanging.</p>
            </div>
        </div>

        <div class="auth-right relative">
            <div class="auth-form-container premium-glass rounded-3xl p-10 reveal-scale">
                <div class="auth-header">
                    <div class="lg:hidden flex items-center gap-2 mb-6 font-bold text-xl text-indigo-600">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                            <path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                        </svg>
                        LocalBridge
                    </div>
                    <h2 class="auth-title">Reset password</h2>
                    <p class="auth-subtitle">Remember your password? <a href="/login" class="auth-link">Sign in</a></p>
                </div>

                <form id="forgot-form" novalidate>
                    <div class="floating-group reveal-up" id="email-group">
                        <input type="email" id="email" name="email" class="floating-input" placeholder=" " required maxlength="150">
                        <label class="floating-label" for="email">Email address</label>
                    </div>

                    <div class="reveal-up mt-6">
                        <button type="submit" id="main-btn" class="btn-premium btn-premium-indigo w-full py-3.5 text-white font-bold">Send Recovery Code</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/animations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            ValidationHelper.attach('email', 'email');
        });

        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('main-btn');
            const email = document.getElementById('email').value;

            // Frontend Validation
            const validation = validateEmailString(email);
            if (!validation.isValid) {
                showToast(validation.message, 'error');
                return;
            }

            try {
                btn.innerHTML = 'Sending...';
                const res = await submitApiForm(e.target, '/forgot-password', 'POST');
                if (res.success) {
                    showToast('Recovery code sent!', 'success');
                    setTimeout(() => {
                        window.location.href = `/reset-password?email=${encodeURIComponent(email)}`;
                    }, 800);
                } else {
                    showToast(res.message || 'Error', 'error');
                    btn.innerHTML = 'Send Recovery Code';
                }
            } catch(err) {
                showToast('Network error', 'error');
                btn.innerHTML = 'Send Recovery Code';
            }
        });
    </script>
</body>
</html>
