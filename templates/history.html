<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - LocalBridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="/static/css/main.css" rel="stylesheet">
    <link href="/static/css/dashboard.css" rel="stylesheet">
    <link href="/static/css/premium-ui.css" rel="stylesheet">
    <style>
      .timeline-container { position: relative; padding-left: 2rem; margin-top: 2rem; }
      .timeline-line {
          position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
          background: linear-gradient(180deg, var(--primary) 0%, #ec4899 100%);
          border-radius: 99px;
          transform-origin: top center;
          transform: scaleY(0); /* Hidden initially for GSAP */
      }
      .timeline-dot {
          position: absolute; left: -5px; top: 1.5rem; width: 12px; height: 12px;
          background: white; border: 3px solid var(--primary); border-radius: 50%;
          box-shadow: 0 0 10px rgba(79, 70, 229, 0.4);
          transform: scale(0);
      }
      .timeline-item { position: relative; padding-bottom: 3rem; opacity: 0; transform: translateX(20px); }
    </style>
</head>
<body class="mesh-bg">

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <!-- Injected by sidebar.js -->
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
            </div>

            <nav class="sidebar-nav">
                <!-- Injected by sidebar.js -->
            </nav>

            <div style="padding: 1.5rem 1rem;">
                <button class="nav-item w-full sidebar-logout text-red-400 hover:text-red-300 hover:bg-red-500/10 justify-start border-none">
                    <!-- Injected by sidebar.js -->
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-navbar">
                <button class="md:hidden icon-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="nav-actions ml-auto">
                    <div class="user-profile-btn" id="profileMenuBtn">
                        <img src="" onerror="this.src='https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff'" id="navAvatar" class="user-avatar" alt="Avatar">
                    </div>
                </div>
            </header>

            <div class="content-area">
                <div class="max-w-2xl mx-auto">
                    <div class="mb-4 reveal-fade">
                        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Your Activity</h1>
                        <p class="text-slate-500 mt-2 text-lg">Your trade history grouped by status.</p>
                    </div>

                    <div class="flex gap-4 border-b border-slate-200 mb-8 reveal-fade">
                        <button onclick="switchTab('Completed')" id="tab-Completed" class="pb-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 px-2 transition-colors">Completed</button>
                        <button onclick="switchTab('Accepted')" id="tab-Accepted" class="pb-3 text-sm font-semibold text-slate-500 hover:text-slate-700 px-2 transition-colors">Accepted</button>
                        <button onclick="switchTab('Cancelled')" id="tab-Cancelled" class="pb-3 text-sm font-semibold text-slate-500 hover:text-slate-700 px-2 transition-colors">Cancelled</button>
                    </div>

                    <div class="timeline-container">
                        <div class="timeline-line"></div>
                        <div id="history-feed">
                            <!-- Injected Timeline Items -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/animations.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script>
        let allMatches = [];
        let currentTab = 'Completed';

        document.addEventListener("DOMContentLoaded", () => {
            AppState.requireAuth();
            loadHistory();
        });

        function switchTab(tab) {
            currentTab = tab;
            ['Completed', 'Accepted', 'Cancelled'].forEach(t => {
                const el = document.getElementById('tab-' + t);
                if (t === tab) {
                    el.className = "pb-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 px-2 transition-colors";
                } else {
                    el.className = "pb-3 text-sm font-semibold text-slate-500 hover:text-slate-700 px-2 transition-colors";
                }
            });
            renderFeed();
        }

        async function loadHistory() {
            try {
                const user = AppState.getUser();
                const res = await fetch(`/exchange/my-requests?userId=${user.id}`);
                const data = await res.json();
                allMatches = [...data.incoming, ...data.outgoing];
                // Sort by ID descending (newest first)
                allMatches.sort((a,b) => b.id - a.id);
                renderFeed();
            } catch { showToast('Error loading history', 'error'); }
        }

        function renderFeed() {
            const feed = document.getElementById('history-feed');
            const filtered = allMatches.filter(m => m.status === currentTab);
            const userEmail = AppState.getUser().email.toLowerCase();

            if (!filtered || filtered.length === 0) {
                feed.innerHTML = `
                    <div class="premium-empty-state opacity-0 text-center py-10">
                        <h3 class="text-lg font-bold">No ${currentTab} trades</h3>
                        <p class="text-slate-500 mt-2">Trades matching this status will appear here.</p>
                    </div>
                `;
                gsap.to('.premium-empty-state', { opacity: 1, duration: 1 });
                gsap.to('.timeline-line', { scaleY: 0, duration: 0.5 });
                return;
            }

            feed.innerHTML = filtered.map((m, i) => {
                const dotColor = currentTab === 'Completed' ? 'border-emerald-500' : currentTab === 'Accepted' ? 'border-indigo-500' : 'border-rose-500';
                const isSender = m.senderEmail && m.senderEmail.toLowerCase() === userEmail;
                return `
                <div class="timeline-item cursor-pointer group" onclick="window.location.href='/product/${m.productId}?match_id=${m.id}'">
                    <div class="timeline-dot ${dotColor} group-hover:scale-125 transition-transform"></div>
                    <div class="bg-white premium-glass p-5 rounded-2xl flex flex-col md:flex-row gap-5 hover:shadow-xl transition-all border border-slate-100 md:items-center">
                        <img src="/static/uploads/${m.productImage ? m.productImage.trim() : ''}" alt="${m.productName}" class="w-16 h-16 md:w-24 md:h-24 rounded-xl object-cover shadow-sm bg-slate-100 flex-shrink-0" onerror="this.src='https://placehold.co/400x300/e2e8f0/64748b?text=Image+Not+Found'">
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="font-bold text-lg text-slate-900 leading-tight">${m.productName}</h3>
                                <span class="text-xs text-slate-400 font-medium">#${m.id}</span>
                            </div>
                            
                            <div class="flex items-center gap-2 text-xs mb-3">
                                <span class="bg-indigo-50 text-indigo-700 px-2.5 py-1 rounded-full font-semibold border border-indigo-100 flex items-center gap-1.5 shadow-sm">
                                    <img src="${m.userAvatar ? '/static/uploads/'+m.userAvatar.trim() : 'https://ui-avatars.com/api/?name='+m.userName}" class="w-4 h-4 rounded-full" onerror="this.src='https://ui-avatars.com/api/?name=${m.userName}'">
                                    ${isSender ? `Sent offer to ` : `Received request from `} <b>${m.userName}</b>
                                </span>
                            </div>
                            
                            <div class="bg-slate-50 border border-slate-100 rounded-lg p-3 text-xs text-slate-600 space-y-1.5 flex flex-col sm:flex-row sm:gap-4 sm:space-y-0 relative overflow-hidden">
                                <div class="absolute right-0 bottom-0 top-0 w-16 bg-gradient-to-l from-slate-50 block md:hidden"></div>
                                ${m.date ? `<div class="flex items-center gap-1.5 font-medium whitespace-nowrap"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${m.date} at ${m.time || 'TBD'}</div>` : ''}
                                <div class="flex items-center gap-1.5 text-slate-500 whitespace-nowrap overflow-hidden text-ellipsis w-full sm:w-auto"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" class="flex-shrink-0" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> <span class="truncate">${m.location || 'Location not set'}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');

            // GSAP Cinematic Timeline Animation
            gsap.set('.timeline-line', { scaleY: 0 });
            gsap.set('.timeline-dot', { scale: 0 });
            gsap.set('.timeline-item', { opacity: 0, x: 20 });

            const tl = gsap.timeline();
            
            tl.to('.timeline-line', {
                scaleY: 1,
                duration: 1.0,
                ease: "power2.out"
            })
            .to('.timeline-dot', {
                scale: 1,
                duration: 0.4,
                stagger: 0.1,
                ease: "back.out(2)"
            }, "-=0.7")
            .to('.timeline-item', {
                x: 0,
                opacity: 1,
                duration: 0.6,
                stagger: 0.1,
                ease: "power3.out"
            }, "-=0.8");
        }
    </script>
</body>
</html>
