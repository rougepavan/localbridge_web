<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Item - LocalBridge</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="/static/css/main.css" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJbhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body class="mesh-bg">

    <div class="dashboard-layout">
        <!-- Premium Sidebar Header Omitted for brevity in edit, assuming user knows layout repeats. We'll duplicate it for completeness -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <!-- Injected by sidebar.js -->
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
            </div>

            <nav class="sidebar-nav">
                <!-- Injected by sidebar.js -->
            </nav>

            <div style="padding: 1.5rem 1rem;">
                <button class="nav-item w-full sidebar-logout text-red-400 hover:text-red-300 hover:bg-red-500/10 justify-start border-none">
                    <!-- Injected by sidebar.js -->
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-navbar">
                <button class="md:hidden icon-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="nav-actions ml-auto">
                    <div class="user-profile-btn" id="profileMenuBtn">
                        <img src="" onerror="this.src='https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff'" id="navAvatar" class="user-avatar" alt="Avatar">
                    </div>
                </div>
            </header>

            <div class="content-area pt-8">
                <div class="max-w-3xl mx-auto">
                    
                    <div class="mb-8 reveal-fade text-center md:text-left">
                        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Post New Item</h1>
                        <p class="text-slate-500 mt-2">Offer something to the community or specify what you are looking for.</p>
                    </div>

                    <div class="premium-glass rounded-3xl p-8 reveal-scale">
                        <form id="post-form" enctype="multipart/form-data" novalidate>
                            
                            <div class="mb-6 relative group cursor-pointer reveal-up">
                                <label for="image" class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-indigo-200 rounded-xl bg-indigo-50/50 transition-all group-hover:bg-indigo-50 group-hover:border-indigo-400">
                                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                        <svg class="w-10 h-10 mb-3 text-indigo-400 group-hover:text-indigo-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                        <p class="mb-2 text-sm text-slate-600"><span class="font-semibold text-indigo-600">Click to upload</span> or drag and drop</p>
                                        <p class="text-xs text-slate-500">SVG, PNG, JPG (MAX. 800x400px)</p>
                                    </div>
                                    <input id="image" name="image" type="file" class="hidden" required accept="image/*" onchange="previewImage(event)"/>
                                </label>
                                <img id="image-preview" class="absolute inset-0 w-full h-full object-cover rounded-xl hidden" />
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 reveal-up">
                                <div class="floating-group">
                                    <input type="text" id="name" name="name" class="floating-input bg-white" placeholder=" " required maxlength="100">
                                    <label class="floating-label" for="name">Item Title</label>
                                </div>
                                <div class="floating-group">
                                    <select id="category" name="category" class="floating-input bg-white" required>
                                        <option value="" disabled selected>Select Category</option>
                                        <option value="Food">Food</option>
                                        <option value="Powders">Powders</option>
                                        <option value="Spices">Spices</option>
                                        <option value="Liquids">Liquids</option>
                                        <option value="Others">Others</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="floating-group reveal-up">
                                <textarea id="description" name="description" rows="3" class="floating-input bg-white resize-none p-4" placeholder=" " required></textarea>
                                <label class="floating-label" for="description">Detailed Description</label>
                            </div>

                            <!-- Quantity Field -->
                            <div id="quantity-section" class="grid grid-cols-2 gap-5 reveal-up hidden mb-5">
                                <div class="floating-group">
                                    <input type="number" id="quantity" name="quantity" class="floating-input bg-white" placeholder=" " step="0.01" min="0.01">
                                    <label class="floating-label" for="quantity">Quantity</label>
                                </div>
                                <div class="floating-group">
                                    <select id="unit" name="unit" class="floating-input bg-white">
                                        <!-- Options injected by JS -->
                                    </select>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5 reveal-up">
                                <div class="floating-group">
                                    <input type="tel" id="pincode" name="pincode" class="floating-input bg-white" placeholder=" " onchange="updateMapFromInputs()" maxlength="6">
                                    <label class="floating-label" for="pincode">Pincode</label>
                                </div>
                                <div class="floating-group">
                                    <input type="text" id="city" name="city" class="floating-input bg-white" placeholder=" " onchange="updateMapFromInputs()" maxlength="100">
                                    <label class="floating-label" for="city">City</label>
                                </div>
                                <div class="floating-group">
                                    <input type="text" id="state" name="state" class="floating-input bg-white" placeholder=" " onchange="updateMapFromInputs()" pattern="^[a-zA-Z\s]+$" title="Please enter a valid state name" maxlength="100">
                                    <label class="floating-label" for="state">State</label>
                                </div>
                            </div>

                            <div class="reveal-up mb-5">
                                <div class="floating-group">
                                    <input type="text" id="location" name="location" class="floating-input bg-white" placeholder=" " required maxlength="255">
                                    <label class="floating-label" for="location">Exact Address (Use map or inputs above)</label>
                                </div>
                                <input type="hidden" id="lat" name="lat">
                                <input type="hidden" id="lng" name="lng">
                            </div>
                                
                                
                                <!-- Inline Map Container (Premium Meetup Details Style) -->
                                <div class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Location (Pick on map below)</div>
                                <div id="map-box" class="relative bg-white border border-slate-200 rounded-[2rem] overflow-hidden mb-8 shadow-2xl shadow-indigo-500/10 transition-all duration-300" style="height: 250px; z-index: 10;">
                                    <div class="relative w-full h-full">
                                        <div id="map" class="absolute inset-0" style="z-index:1;"></div>

                                        <!-- Android-style Fixed Center Pin -->
                                        <div id="postMapCenterPin" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-[95%] z-[1001] pointer-events-none transition-transform duration-200 ease-out" style="filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));">
                                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M12 21.7C17.3333 16.2 21 12.2 21 8.5C21 3.8 17.2 0 12.5 0C7.8 0 4 3.8 4 8.5C4 12.2 7.66667 16.2 13 21.7C12.7333 21.9667 12.2667 21.9667 12 21.7Z" fill="#3B82F6"/>
                                                <circle cx="12.5" cy="8.5" r="3.5" fill="white"/>
                                            </svg>
                                        </div>
                                        
                                        <div id="map-search-container" class="absolute top-4 left-4 right-4 z-[1000] flex gap-2">
                                            <div class="relative flex-1 group">
                                                <input type="text" id="map-search" placeholder="Search Pincode, City, or Town..." 
                                                    class="w-full text-sm py-3.5 px-5 rounded-2xl border border-slate-200 shadow-xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 bg-white/95 backdrop-blur-md transition-all placeholder:text-slate-400">
                                            </div>
                                            <button type="button" onclick="searchLocation()" class="bg-indigo-600 text-white w-12 h-12 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all flex items-center justify-center shrink-0 active:scale-95">
                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                            </button>
                                            <!-- Dedicated Close Button for Modal -->
                                            <button type="button" id="close-map-btn" onclick="closeMapModal()" class="hidden bg-white/95 backdrop-blur-md text-slate-800 w-12 h-12 rounded-2xl shadow-xl hover:bg-white transition-all items-center justify-center shrink-0 active:scale-95 border border-slate-200">
                                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                            </button>
                                        </div>

                                        <!-- Fullscreen Toggle (Floating Bottom-Left) -->
                                        <button type="button" onclick="openMapModal()" class="absolute bottom-4 left-4 z-[1000] bg-white/95 backdrop-blur-md p-3 rounded-2xl shadow-xl hover:bg-white transition-all border border-slate-200 text-slate-700 active:scale-95" title="Expand Map">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                                        </button>

                                        <!-- Locate Me (Premium with Text) -->
                                        <button type="button" onclick="locateMe()" class="absolute bottom-4 right-4 z-[1000] bg-white/95 backdrop-blur-md px-5 py-3 rounded-2xl shadow-xl hover:bg-white transition-all border border-slate-200 text-slate-800 flex items-center gap-2 font-bold text-xs active:scale-95">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                                            Locate
                                        </button>
                                    </div>
                                </div>
                                

                            <!-- Dynamic Food Fields -->
                            <div id="food-fields" class="grid grid-cols-1 md:grid-cols-2 gap-5 reveal-up hidden mb-5">
                                <div class="floating-group">
                                    <select id="freshness" name="freshness" class="floating-input bg-white">
                                        <option value="" disabled selected>Select Freshness</option>
                                        <option value="Fresh/New">Fresh/New</option>
                                        <option value="1-2 Days Old">1-2 Days Old</option>
                                        <option value="Near Expiry">Near Expiry</option>
                                    </select>
                                </div>
                                <div class="floating-group">
                                    <input type="date" id="expiry_date" name="expiry_date" class="floating-input bg-white">
                                    <label class="floating-label" for="expiry_date" style="transform:translateY(-130%) scale(0.75);">Best Before</label>
                                </div>
                            </div>

                            <!-- Dynamic Other Fields -->
                            <div id="other-fields" class="grid grid-cols-1 md:grid-cols-2 gap-5 reveal-up hidden mb-5">
                                <div class="floating-group">
                                    <select id="item_condition" name="item_condition" class="floating-input bg-white">
                                        <option value="" disabled selected>Select Item Condition</option>
                                        <option value="Brand New">Brand New</option>
                                        <option value="Like New">Like New</option>
                                        <option value="Used/Good">Used / Good</option>
                                        <option value="Needs Repair">Needs Repair</option>
                                    </select>
                                </div>
                                <div class="floating-group">
                                    <input type="text" id="used_for" name="used_for" class="floating-input bg-white" placeholder="e.g. 1 year, 2 months" maxlength="100">
                                    <label class="floating-label" for="used_for">How long was it used for?</label>
                                </div>
                            </div>

                            <div class="floating-group reveal-up mb-5">
                                <input type="text" id="return_offer" name="return_offer" class="floating-input bg-white" placeholder=" " maxlength="255">
                                <label class="floating-label" for="return_offer">Looking For In Return</label>
                            </div>

                            <button type="submit" id="submit-btn" class="btn-premium btn-premium-indigo w-full py-4 mt-6 rounded-xl text-lg reveal-up font-bold text-white">Publish Item</button>

                        </form>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/animations.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            ValidationHelper.attach('name', 'name');
            ValidationHelper.attach('city', 'city');
            ValidationHelper.attach('pincode', 'pincode');
            ValidationHelper.attach('description', 'required');
            ValidationHelper.attach('location', 'required');

            AppState.requireAuth();
            initMap();
        });

        function openMapModal() {
            const modal = document.getElementById('map-box');
            
            // Create a placeholder to keep layout from jumping
            const placeholder = document.createElement('div');
            placeholder.id = 'map-placeholder';
            placeholder.className = 'w-full mb-8';
            placeholder.style.height = '250px';
            modal.parentNode.insertBefore(placeholder, modal);

            // Show Close Button
            document.getElementById('close-map-btn')?.classList.remove('hidden');
            document.getElementById('close-map-btn')?.classList.add('flex');

            // Turn into fullscreen modal
            modal.classList.remove('relative', 'border', 'border-slate-200', 'rounded-[2rem]', 'mb-8');
            modal.classList.add('fixed', 'top-1/2', 'left-1/2', '-translate-x-1/2', '-translate-y-1/2', 'z-[9999]', 'w-[90%]', 'max-w-2xl', 'rounded-3xl', 'shadow-2xl');
            modal.style.height = '70vh';

            let backdrop = document.getElementById('map-backdrop');
            if(!backdrop) {
                backdrop = document.createElement('div');
                backdrop.id = 'map-backdrop';
                backdrop.className = 'fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9998] cursor-pointer';
                backdrop.onclick = closeMapModal;
                document.body.appendChild(backdrop);
            }
            backdrop.style.display = 'block';

            // Triple Invalidation for heavy layout shift
            setTimeout(() => { if(map) map.invalidateSize(); }, 50);
            setTimeout(() => { if(map) map.invalidateSize(); }, 200);
            setTimeout(() => { if(map) map.invalidateSize(); }, 500);
        }

        function closeMapModal() {
            const modal = document.getElementById('map-box');
            
            const placeholder = document.getElementById('map-placeholder');
            if(placeholder) placeholder.remove();

            // Hide Close Button
            document.getElementById('close-map-btn')?.classList.add('hidden');
            document.getElementById('close-map-btn')?.classList.remove('flex');

            // Revert to inline box
            modal.classList.add('relative', 'border', 'border-slate-200', 'rounded-[2rem]', 'mb-8');
            modal.classList.remove('fixed', 'top-1/2', 'left-1/2', '-translate-x-1/2', '-translate-y-1/2', 'z-[9999]', 'w-[90%]', 'max-w-2xl', 'rounded-3xl', 'shadow-2xl');
            modal.style.height = '250px';

            const backdrop = document.getElementById('map-backdrop');
            if(backdrop) backdrop.style.display = 'none';

            setTimeout(() => { if(map) map.invalidateSize(); }, 50);
            setTimeout(() => { if(map) map.invalidateSize(); }, 300);
        }

        let map, mapInitialized = false;
        let isSearching = false;

        function initMap() {
            if(mapInitialized) return;
            mapInitialized = true;
            // Default center India
            const indiaCenter = [20.5937, 78.9629];
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false,
                zoomAnimation: false,
                fadeAnimation: false,
                markerZoomAnimation: false,
                inertia: false
            }).setView(indiaCenter, 5);

            // High-quality Open Source Tiles (CartoDB Voyager)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                maxZoom: 20
            }).addTo(map);

            // Initial render fix for tiles
            setTimeout(() => { if(map) map.invalidateSize(); }, 200);
            
            // Default center India (Initially no marker until clicked/located)
            map.setView(indiaCenter, 5);

            // ResizeObserver for perfect rendering in the new premium box
            const ro = new ResizeObserver(() => {
                if (map) map.invalidateSize();
            });
            ro.observe(document.getElementById('map-box'));

            // Initial render fix for tiles
            setTimeout(() => { if(map) map.invalidateSize(); }, 300);
            setTimeout(() => { if(map) map.invalidateSize(); }, 600);

            // Track map movement for location selection (Android style)
            map.on('movestart', () => {
                const pin = document.getElementById('postMapCenterPin');
                if(pin) pin.style.transform = 'translate(-50%, -110%) scale(1.1)';
            });

            map.on('move', () => {
                const center = map.getCenter();
                updateLocation(center.lat, center.lng, null, false);
            });

            map.on('moveend', () => {
                const pin = document.getElementById('postMapCenterPin');
                if(pin) pin.style.transform = 'translate(-50%, -95%) scale(1.0)';
                const center = map.getCenter();
                reverseGeocodePost(center.lat, center.lng);
            });
            
            // Initial render fix for tiles
            setTimeout(() => { map.invalidateSize(); }, 100);
            
            // Try to get user location on load (silently)
            locateMe(false);
        }

        async function updateMapFromInputs() {
            const pincode = document.getElementById('pincode').value;
            const city = document.getElementById('city').value;
            const state = document.getElementById('state').value;
            
            if(!pincode && !city && !state) return;
            
            const query = [pincode, city, state].filter(Boolean).join(', ');
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await res.json();
                if(data && data.length > 0) {
                    const { lat, lon } = data[0];
                    updateLocation(parseFloat(lat), parseFloat(lon), 13);
                }
            } catch(e) {}
        }

        function locateMe(isManual = true) {
            if (!navigator.geolocation) {
                if(isManual) showToast('Geolocation is not supported by your browser.', 'error');
                return;
            }
            
            if(isManual) showToast('Detecting your location...', 'info');
            const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };
            
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude, longitude } = pos.coords;
                updateLocation(latitude, longitude, 15);
                if(isManual) showToast('Location detected!', 'success');
            }, (err) => {
                if(isManual) {
                    console.warn(`Geolocation error (${err.code}): ${err.message}`);
                    let msg = 'Could not detect location.';
                    if(err.code === 1) msg = 'Location permission blocked. Please enable it in your browser settings or click the map manually.';
                    else if(err.code === 3) msg = 'Location request timed out. Please try again or click the map manually.';
                    showToast(msg, 'error');
                }
            }, options);
        }

        async function updateLocation(lat, lng, zoom = null, doFly = true) {
            if(doFly) {
                if(zoom) map.setView([lat, lng], zoom, { animate: false });
                else map.setView([lat, lng], map.getZoom(), { animate: false });
            }
            
            document.getElementById('lat').value = lat;
            document.getElementById('lng').value = lng;
        }

        async function reverseGeocodePost(lat, lng) {
            if(isSearching) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await res.json();
                if(data && data.address && !isSearching) {
                    const addr = data.display_name;
                    const locField = document.getElementById('location');
                    locField.value = addr;
                    ValidationHelper.validate(locField, 'location');
                    
                    // Try to auto-populate fields if empty
                    const pinField = document.getElementById('pincode');
                    const cityField = document.getElementById('city');
                    
                    if(!pinField.value) {
                        pinField.value = data.address.postcode || '';
                        if(pinField.value) ValidationHelper.validate(pinField, 'pincode');
                    }
                    if(!cityField.value) {
                        cityField.value = data.address.city || data.address.town || data.address.village || '';
                        if(cityField.value) ValidationHelper.validate(cityField, 'city');
                    }
                    if(!document.getElementById('state').value) document.getElementById('state').value = data.address.state || '';
                }
            } catch(e) { console.error('Geocode error', e); }
        }

        async function searchLocation() {
            const query = document.getElementById('map-search').value;
            if(!query) return;
            
            isSearching = true;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await res.json();
                if(data && data.length > 0) {
                    const { lat, lon, display_name } = data[0];
                    const locField = document.getElementById('location');
                    locField.value = display_name;
                    updateLocation(parseFloat(lat), parseFloat(lon), 15);
                    ValidationHelper.validate(locField, 'location');
                } else {
                    showToast('Location not found.', 'error');
                }
            } catch(e) {
                showToast('Search error.', 'error');
            } finally {
                // Keep locked for a while to allow map movement to settle
                setTimeout(() => { isSearching = false; }, 1200);
            }
        }

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function(){
                const output = document.getElementById('image-preview');
                output.src = reader.result;
                output.classList.remove('hidden');
                
                // Add tiny jump animation
                gsap.from(output, { scale: 0.9, opacity: 0, duration: 0.4, ease: "back.out(2)" });
            };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        document.getElementById('category').addEventListener('change', function(e) {
            const val = e.target.value;
            const foodFields = document.getElementById('food-fields');
            const otherFields = document.getElementById('other-fields');
            const qtySection = document.getElementById('quantity-section');
            const unitSelect = document.getElementById('unit');
            
            // Handle visibility
            if(['Food', 'Powders', 'Spices', 'Liquids'].includes(val)) {
                foodFields.classList.remove('hidden');
                otherFields.classList.add('hidden');
                qtySection.classList.remove('hidden');
            } else {
                foodFields.classList.add('hidden');
                otherFields.classList.remove('hidden');
                qtySection.classList.add('hidden');
            }

            // Handle units
            unitSelect.innerHTML = '';
            if(['Food', 'Powders', 'Spices'].includes(val)) {
                unitSelect.innerHTML = `
                    <option value="kg">kg</option>
                    <option value="g">g</option>
                `;
            } else if(val === 'Liquids') {
                unitSelect.innerHTML = `
                    <option value="l">l</option>
                    <option value="ml">ml</option>
                `;
            }
        });

        document.getElementById('post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Immediate visual feedback for all fields
            if (!ValidationHelper.validateAll('post-form')) {
                showToast('Please check the fields highlighted in red.', 'error');
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.innerHTML = 'Publishing...';
            
            const formData = new FormData(e.target);
            formData.append('user_name', AppState.getUser().email);

            // Nullify the fields we don't need based on category
            const category = formData.get('category');
            if (['Food', 'Powders', 'Spices', 'Liquids'].includes(category)) {
                formData.set('item_condition', '');
                formData.set('used_for', '');
            } else if (category === 'Others') {
                formData.set('freshness', '');
                formData.set('expiry_date', '');
            }

            try {
                const res = await fetch('/upload-product', { method: 'POST', body: formData });
                const data = await res.json();
                
                if(data.success) {
                    showToast('Item successfully posted!', 'success');
                    gsap.to(e.target, { y: -20, opacity: 0, duration: 0.4 });
                    setTimeout(() => window.location.href = '/dashboard', 800);
                } else {
                    showToast(data.message || 'Failed to post', 'error');
                    btn.innerHTML = 'Publish Item';
                }
            } catch (err) {
                showToast('Network error', 'error');
                btn.innerHTML = 'Publish Item';
            }
        });
    </script>
</body>
</html>
