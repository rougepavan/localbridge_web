<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make an Offer - LocalBridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="/static/css/main.css" rel="stylesheet">
    <link href="/static/css/dashboard.css" rel="stylesheet">
    <link href="/static/css/premium-ui.css" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJbhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body class="mesh-bg">

    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"></div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
            </div>
            <nav class="sidebar-nav"></nav>
            <div style="padding: 1.5rem 1rem;">
                <button class="nav-item w-full sidebar-logout text-red-400 hover:text-red-300 hover:bg-red-500/10 justify-start border-none"></button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-navbar">
                <button class="md:hidden icon-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="nav-actions ml-auto flex items-center gap-4">
                    <a href="/dashboard" class="text-indigo-600 font-semibold text-sm hover:underline flex items-center gap-2">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                        Back to Dashboard
                    </a>
                    <div class="user-profile-btn" id="profileMenuBtn">
                        <img src="" onerror="this.src='https://ui-avatars.com/api/?name=User&background=4f46e5&color=fff'" id="navAvatar" class="user-avatar" alt="Avatar">
                    </div>
                </div>
            </header>

            <div class="content-area">
                <div class="max-w-4xl mx-auto">
                    <div class="mb-10 reveal-fade">
                        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Make an Offer</h1>
                        <p class="text-slate-500 mt-2">Propose an exchange and set a meetup location.</p>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
                        <!-- Left: Product Summary -->
                        <div class="lg:col-span-2 space-y-6">
                            <div class="premium-glass p-6 reveal-scale">
                                <h3 class="font-bold text-slate-800 mb-4 border-b border-slate-100 pb-2">Listing Summary</h3>
                                <div id="productSummary">
                                    <div class="animate-pulse flex flex-col gap-4">
                                        <div class="h-40 bg-slate-200 rounded-xl"></div>
                                        <div class="h-4 w-3/4 bg-slate-200 rounded"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="premium-glass p-6 reveal-scale" style="transition-delay: 0.1s">
                                <h3 class="font-bold text-slate-800 mb-4 border-b border-slate-100 pb-2">Owner</h3>
                                <div id="ownerInfo" class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-slate-200 animate-pulse"></div>
                                    <div class="h-4 w-24 bg-slate-200 rounded animate-pulse"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Right: Offer Form -->
                        <div class="lg:col-span-3">
                            <div class="premium-glass p-8 reveal-scale" style="transition-delay: 0.2s">
                                <form id="offerForm" enctype="multipart/form-data">
                                    <input type="hidden" id="productId" name="productId">
                                    <input type="hidden" id="userId" name="userId">

                                    <div class="mb-8">
                                        <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Meetup Details</h4>
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div class="floating-group">
                                                <input type="date" id="date" name="date" class="floating-input" required>
                                                <label class="floating-label" for="date" style="transform:translateY(-130%) scale(0.75);">Proposed Date</label>
                                            </div>
                                            <div class="floating-group">
                                                <input type="time" id="time" name="time" class="floating-input" required>
                                                <label class="floating-label" for="time" style="transform:translateY(-130%) scale(0.75);">Proposed Time</label>
                                            </div>
                                        </div>
                                        <div class="floating-group">
                                            <input type="text" id="location" name="location" class="floating-input" placeholder=" " required maxlength="255">
                                            <label class="floating-label" for="location">Meeting Location (Pick on map below)</label>
                                        </div>
                                        <input type="hidden" id="lat" name="lat">
                                        <input type="hidden" id="lng" name="lng">
                                        
                                        
                                        <!-- Inline Map Container -->
                                        <div id="map-modal" class="relative flex flex-col bg-white border border-slate-200 rounded-xl overflow-hidden mb-8 transition-all duration-300" style="height: 250px; z-index: 10;">
                                            <div id="map-header" class="hidden items-center justify-between p-4 border-b border-slate-100 shadow-sm bg-white shrink-0">
                                                <h3 class="font-bold text-slate-800 text-lg">Pick Meeting Location</h3>
                                                <button type="button" onclick="closeMapModal()" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-600 transition-colors">
                                                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                                                </button>
                                            </div>
                                            
                                            <div class="relative flex-1  min-h-0">
                                                <div id="map" class="absolute inset-0" style="z-index:1;"></div>
                                                
                                                <!-- Top Search Bar -->
                                                <div class="absolute top-2 left-2 right-12 z-[1000] flex gap-2">
                                                    <input type="text" id="map-search" placeholder="Search Pincode, City, or Town..." class="flex-1 text-sm p-2 rounded-lg border border-slate-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white/95 backdrop-blur-sm">
                                                    <button type="button" onclick="searchLocation()" class="bg-indigo-600 text-white px-3 rounded-lg shadow-sm hover:bg-indigo-700 transition-colors flex items-center justify-center">
                                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                                    </button>
                                                </div>
                                                
                                                <!-- Fullscreen Toggle Icon -->
                                                <button type="button" onclick="openMapModal()" class="absolute top-2 right-2 z-[1000] bg-white/95 backdrop-blur-sm p-2 rounded-lg shadow-sm hover: transition-all border border-slate-200 text-slate-700" title="Expand Map">
                                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                                                </button>

                                                <!-- Locate Me -->
                                                <button type="button" onclick="locateMe()" class="absolute bottom-4 right-2 z-[1000] bg-white/95 backdrop-blur-sm p-2 rounded-lg shadow-sm hover: transition-all border border-slate-200 text-slate-700" title="Locate Me">
                                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                                                </button>
                                            </div>
                                            <div id="map-footer" class="hidden p-4 bg-white border-t border-slate-100 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] shrink-0">
                                                <button type="button" onclick="closeMapModal()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 text-sm rounded-xl shadow-lg transition-transform active:scale-[0.98]">
                                                    Confirm Selected Location
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="mb-8">
                                        <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Your Offer</h4>
                                        <div class="floating-group">
                                            <textarea id="offer_text" name="offer_text" rows="3" class="floating-input p-4 resize-none" placeholder=" " required></textarea>
                                            <label class="floating-label" for="offer_text">What are you offering in return?</label>
                                        </div>
                                        
                                        <div class="mt-4">
                                            <label class="block text-sm font-semibold text-slate-700 mb-2">Offer Image (Optional)</label>
                                            <div class="relative group cursor-pointer">
                                                <label for="offer_image" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-indigo-200 rounded-xl bg-indigo-50/50 hover:bg-indigo-50 hover:border-indigo-400 transition-all">
                                                    <div class="flex flex-col items-center justify-center pt-2">
                                                        <svg class="w-8 h-8 mb-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                                        <p class="text-xs text-slate-500"><span class="font-semibold text-indigo-600 text-sm">Upload Photo</span></p>
                                                    </div>
                                                    <input id="offer_image" name="offer_image" type="file" class="hidden" accept="image/*" onchange="previewOfferImage(event)"/>
                                                </label>
                                                <img id="offer-image-preview" class="absolute inset-0 w-full h-full object-cover rounded-xl hidden" />
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" id="submitBtn" class="btn-premium btn-premium-indigo w-full py-4 text-lg shadow-xl shadow-indigo-600/20 text-white font-bold">Send Exchange Request</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/animations.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pid = urlParams.get('id');

        document.addEventListener("DOMContentLoaded", async () => {
            ValidationHelper.attach('date', 'required');
            ValidationHelper.attach('time', 'required');
            ValidationHelper.attach('location', 'required');
            ValidationHelper.attach('offer_text', 'required');

            AppState.requireAuth();
            initMap();
            const user = AppState.getUser();
            document.getElementById('userId').value = user.id;
            document.getElementById('productId').value = pid;

            if(!pid) {
                window.location.href = '/dashboard';
                return;
            }

            try {
                const res = await fetch(`/make-offer-data?id=${pid}`);
                const p = await res.json();
                
                if(p.error) throw new Error(p.error);

                // Populate product summary
                document.getElementById('productSummary').innerHTML = `
                    <img src="/static/uploads/${p.image_name}" class="w-full h-48 object-cover rounded-xl shadow-sm mb-4">
                    <div class="flex justify-between items-start">
                        <h2 class="text-xl font-bold text-slate-900">${p.name}</h2>
                        ${p.quantity ? `<span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full text-[10px] font-bold border border-indigo-200">${p.quantity} ${p.unit || ''}</span>` : ''}
                    </div>
                    <p class="text-sm text-slate-500 mt-1">${p.category}</p>
                    <div class="mt-4 p-3  rounded-lg text-sm text-slate-600 border border-slate-100">
                        <span class="font-bold text-slate-800">Return Offer expectation:</span><br>
                        ${p.return_offer || 'Open to any fair exchange.'}
                    </div>
                `;

                // Populate owner info
                document.getElementById('ownerInfo').innerHTML = `
                    <img src="/static/uploads/${p.ownerAvatar || 'default.png'}" 
                         onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p.ownerName)}&background=4f46e5&color=fff'" 
                         class="w-10 h-10 rounded-full object-cover border border-slate-200">
                    <div class="leading-tight">
                        <div class="font-bold text-slate-900 text-sm">${p.ownerName}</div>
                        <div class="text-[10px] text-slate-400 uppercase tracking-wider">${p.ownerEmail}</div>
                    </div>
                `;

            } catch(e) {
                showToast('Error loading item details.', 'error');
            }
        });

        function openMapModal() {
            const modal = document.getElementById('map-modal');
            
            const placeholder = document.createElement('div');
            placeholder.id = 'map-placeholder';
            placeholder.className = 'w-full mb-8';
            placeholder.style.height = '250px';
            modal.parentNode.insertBefore(placeholder, modal);

            modal.classList.remove('relative', 'border', 'border-slate-200', 'rounded-xl', 'mb-8');
            modal.classList.add('fixed', 'top-1/2', 'left-1/2', '-translate-x-1/2', '-translate-y-1/2', 'z-[9999]', 'w-[90%]', 'max-w-2xl', 'rounded-3xl', 'shadow-2xl');
            modal.style.height = '70vh';

            let backdrop = document.getElementById('map-backdrop');
            if(!backdrop) {
                backdrop = document.createElement('div');
                backdrop.id = 'map-backdrop';
                backdrop.className = 'fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9998]';
                document.body.appendChild(backdrop);
            }
            backdrop.style.display = 'block';

            document.getElementById('map-header').classList.remove('hidden');
            document.getElementById('map-header').classList.add('flex');
            document.getElementById('map-footer').classList.remove('hidden');
            
            // Fix for missing grids: wait for animation then invalidate
            setTimeout(() => { if(map) map.invalidateSize(); }, 400);
        }

        function closeMapModal() {
            const modal = document.getElementById('map-modal');
            
            const placeholder = document.getElementById('map-placeholder');
            if(placeholder) placeholder.remove();

            modal.classList.add('relative', 'border', 'border-slate-200', 'rounded-xl', 'mb-8');
            modal.classList.remove('fixed', 'top-1/2', 'left-1/2', '-translate-x-1/2', '-translate-y-1/2', 'z-[9999]', 'w-[90%]', 'max-w-2xl', 'rounded-3xl', 'shadow-2xl');
            modal.style.height = '250px';

            const backdrop = document.getElementById('map-backdrop');
            if(backdrop) backdrop.style.display = 'none';

            document.getElementById('map-header').classList.add('hidden');
            document.getElementById('map-header').classList.remove('flex');
            document.getElementById('map-footer').classList.add('hidden');
            setTimeout(() => { if(map) map.invalidateSize(); }, 50);
        }

        let map, marker;
        function initMap() {
            // Default center India
            const indiaCenter = [20.5937, 78.9629];
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false,
                zoomAnimation: false,
                fadeAnimation: false,
                markerZoomAnimation: false,
                inertia: false
            }).setView(indiaCenter, 5);

            // High-quality Open Source Tiles (CartoDB Voyager)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                maxZoom: 20
            }).addTo(map);

            marker = L.marker(indiaCenter, { 
                draggable: true,
                icon: L.divIcon({
                    html: `<div style="filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 21.7C17.3333 16.2 21 12.2 21 8.5C21 3.8 17.2 0 12.5 0C7.8 0 4 3.8 4 8.5C4 12.2 7.66667 16.2 13 21.7C12.7333 21.9667 12.2667 21.9667 12 21.7Z" fill="#EF4444"/>
                                <circle cx="12.5" cy="8.5" r="3.5" fill="white"/>
                            </svg>
                           </div>`,
                    className: '',
                    iconSize: [40, 40],
                    iconAnchor: [20, 40]
                })
            }).addTo(map);

            map.on('click', (e) => {
                const { lat, lng } = e.latlng;
                updateLocation(lat, lng);
            });

            marker.on('dragend', (e) => {
                const { lat, lng } = marker.getLatLng();
                updateLocation(lat, lng);
            });
            
            // Try to get user location on load (silently)
            locateMe(false);
        }

        function locateMe(isManual = true) {
            if (!navigator.geolocation) {
                if(isManual) showToast('Geolocation is not supported by your browser.', 'error');
                return;
            }
            
            if(isManual) showToast('Detecting your location...', 'info');
            const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };
            
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude, longitude } = pos.coords;
                updateLocation(latitude, longitude, 15);
                if(isManual) showToast('Location detected!', 'success');
            }, (err) => {
                if(isManual) {
                    console.warn(`Geolocation error (${err.code}): ${err.message}`);
                    let msg = 'Could not detect location.';
                    if(err.code === 1) msg = 'Location permission blocked. Please enable it in your browser settings or click the map manually.';
                    else if(err.code === 3) msg = 'Location request timed out. Please try again or click the map manually.';
                    showToast(msg, 'error');
                }
            }, options);
        }

        async function updateLocation(lat, lng, zoom = null) {
            marker.setLatLng([lat, lng]);
            if(zoom) map.setView([lat, lng], zoom, { animate: false });
            else map.panTo([lat, lng], { animate: false });
            
            document.getElementById('lat').value = lat;
            document.getElementById('lng').value = lng;

            // Reverse geocode
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await res.json();
                if(data.display_name) {
                    document.getElementById('location').value = data.display_name;
                }
            } catch(e) { console.error('Geocode error', e); }
        }

        async function searchLocation() {
            const query = document.getElementById('map-search').value;
            if(!query) return;
            
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await res.json();
                if(data && data.length > 0) {
                    const { lat, lon } = data[0];
                    updateLocation(parseFloat(lat), parseFloat(lon), 15);
                } else {
                    showToast('Location not found.', 'error');
                }
            } catch(e) {
                showToast('Search error.', 'error');
            }
        }

        function previewOfferImage(e) {
            const reader = new FileReader();
            reader.onload = function(){
                const output = document.getElementById('offer-image-preview');
                output.src = reader.result;
                output.classList.remove('hidden');
                gsap.from(output, { scale: 0.9, opacity: 0, duration: 0.4, ease: "back.out(2)" });
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        }

        document.getElementById('offerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const orig = btn.innerHTML;
            btn.innerHTML = 'Sending...';
            btn.disabled = true;

            const formData = new FormData(e.target);
            try {
                const res = await fetch('/exchange/request', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if(data.success) {
                    showToast('Exchange request sent!', 'success');
                    setTimeout(() => window.location.href = '/dashboard', 1500);
                } else {
                    showToast(data.message, 'error');
                }
            } catch(e) {
                showToast('Network error', 'error');
            } finally {
                btn.innerHTML = orig;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
