<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches - LocalBridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="/static/css/main.css" rel="stylesheet">
    <link href="/static/css/dashboard.css" rel="stylesheet">
    <link href="/static/css/premium-ui.css" rel="stylesheet">
</head>
<body class="mesh-bg">

    <div class="dashboard-layout">
        <!-- Premium Sidebar Header -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <!-- Injected by sidebar.js -->
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
            </div>

            <nav class="sidebar-nav">
                <!-- Injected by sidebar.js -->
            </nav>

            <div style="padding: 1.5rem 1rem;">
                <button class="nav-item w-full sidebar-logout text-red-400 hover:text-red-300 hover:bg-red-500/10 justify-start border-none">
                    <!-- Injected by sidebar.js -->
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-navbar">
                <button class="md:hidden icon-btn" id="sidebarMenuBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="nav-actions ml-auto">
                    <div class="user-profile-btn" id="profileMenuBtn">
                        <img src="" onerror="this.src='https://ui-avatars.com/api/?name=User&background=4f46e5&color=fff'" id="navAvatar" class="user-avatar" alt="Avatar">
                        <div class="user-info hidden sm:flex pr-2">
                            <span class="user-name" id="navName">Loading...</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-area">
                <div class="mb-10 reveal-fade flex justify-between items-end">
                    <div>
                        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Active Matches</h1>
                        <p class="text-slate-500 mt-2">Manage your incoming and outgoing exchange requests.</p>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="flex gap-4 border-b border-slate-200 mb-8 reveal-fade">
                    <button onclick="switchTab('incoming')" id="tab-incoming" class="pb-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 px-2 transition-colors">Requests Received</button>
                    <button onclick="switchTab('outgoing')" id="tab-outgoing" class="pb-3 text-sm font-semibold text-slate-500 hover:text-slate-700 px-2 transition-colors">Offers Sent</button>
                </div>

                <!-- Match Feeds -->
                <div id="incoming-feed" class="grid grid-cols-1 xl:grid-cols-2 gap-6"></div>
                <div id="outgoing-feed" class="grid grid-cols-1 xl:grid-cols-2 gap-6 hidden"></div>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/animations.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script>
        let currentTab = 'incoming';
        document.addEventListener("DOMContentLoaded", () => {
            AppState.requireAuth();
            loadMatches();
        });

        function switchTab(tab) {
            currentTab = tab;
            const incTab = document.getElementById('tab-incoming');
            const outTab = document.getElementById('tab-outgoing');
            const incFeed = document.getElementById('incoming-feed');
            const outFeed = document.getElementById('outgoing-feed');

            if(tab === 'incoming') {
                incTab.className = "pb-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 px-2 transition-colors";
                outTab.className = "pb-3 text-sm font-semibold text-slate-500 hover:text-slate-700 px-2 transition-colors";
                incFeed.classList.remove('hidden');
                outFeed.classList.add('hidden');
            } else {
                outTab.className = "pb-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600 px-2 transition-colors";
                incTab.className = "pb-3 text-sm font-semibold text-slate-500 hover:text-slate-700 px-2 transition-colors";
                outFeed.classList.remove('hidden');
                incFeed.classList.add('hidden');
            }
            // Trigger GSAP re-animation on tab switch
            window.animateFeedCards('.match-card', tab === 'incoming' ? incFeed : outFeed);
        }

        async function updateStatus(id, newStatus, productId, isSender = false) {
            try {
                const res = await fetch('/exchange/update', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ requestId: id, status: newStatus, isSender: isSender })
                });
                const data = await res.json();
                if(data.success) {
                    showToast('Status updated seamlessly', 'success');

                    // Card exit animation before reloading
                    gsap.to(`#match-${id}`, {
                        scale: 0.9, opacity: 0, duration: 0.3, onComplete: () => {
                            loadMatches();
                        }
                    });
                } else showToast(data.message, 'error');
            } catch { showToast('Network Error', 'error'); }
        }

        async function loadMatches() {
            try {
                const res = await fetch(`/exchange/my-requests?userId=${AppState.getUser().id}`);
                const data = await res.json();
                
                function renderCards(items, isIncoming) {
                    if(!items || items.length === 0) return `
                        <div class="col-span-full premium-empty-state">
                            <h3 class="text-lg font-bold">No active ${isIncoming ? 'requests' : 'offers'}</h3>
                            <p class="text-slate-500">When you ${isIncoming ? 'receive' : 'make'} offers, they will appear here beautifully.</p>
                        </div>`;
                    
                    return items.map(m => `
                        <div onclick="window.location.href='/product/${m.productId}?match_id=${m.id}'" class="feed-card match-card premium-glass mb-4 opacity-0 flex flex-col md:flex-row shadow-sm hover:shadow-lg hover:-translate-y-1 transition-all cursor-pointer" id="match-${m.id}">
                            <img src="/static/uploads/${m.productImage ? m.productImage.trim() : ''}" alt="Product" class="w-full md:w-48 h-48 md:h-full object-cover" onerror="this.src='https://placehold.co/400x300/e2e8f0/64748b?text=Image+Not+Found'">
                            
                            <div class="p-6 flex-1 flex flex-col">
                                <div class="flex justify-between items-start mb-4">
                                    <div>
                                        <div class="flex items-center gap-2 mb-1">
                                            <h3 class="font-bold text-xl text-slate-900">${m.productName}</h3>
                                            ${m.quantity ? `<span class="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full text-[10px] font-bold border border-indigo-100">${m.quantity} ${m.unit || ''}</span>` : ''}
                                        </div>
                                        <div class="flex items-center gap-2 text-sm text-slate-600 rounded-full bg-slate-100 px-3 py-1 w-fit">
                                            <img src="${m.userAvatar ? '/static/uploads/'+m.userAvatar.trim() : `https://ui-avatars.com/api/?name=${m.userName}`}" class="w-5 h-5 rounded-full" onerror="this.src='https://ui-avatars.com/api/?name=${m.userName}'">
                                            <span>${isIncoming ? 'Requested by' : 'Offered to'} <b>${m.userName}</b></span>
                                        </div>
                                    </div>
                                    <span class="px-3 py-1 rounded-full text-xs font-bold border ${getStatusColor(m.status)}">${m.status}</span>
                                </div>
                                
                                <div class="bg-indigo-50/50 rounded-xl p-4 border border-indigo-100 mb-4 grow">
                                    <p class="text-sm italic text-slate-700 leading-relaxed">"${m.offer}"</p>
                                    ${m.offerImage && m.offerImage !== 'null' ? `<img src="/static/uploads/${m.offerImage.trim()}" class="mt-3 h-16 w-16 object-cover rounded-lg border border-slate-200" onerror="this.style.display='none'">` : ''}
                                </div>
                                
                                <div class="flex gap-3 justify-end mt-auto">
                                    ${m.status === 'Requested' && isIncoming ? `
                                        <button onclick="event.stopPropagation(); window.location.href='/product/${m.productId}?match_id=${m.id}'" class="btn-premium btn-premium-indigo py-2 px-4 text-sm text-white font-bold mr-auto">Review &amp; Chat</button>
                                        <button onclick="event.stopPropagation(); updateStatus(${m.id}, 'Declined', ${m.productId})" class="btn-premium btn-premium-rose py-2 px-4 text-sm text-white font-bold">Decline</button>
                                        <button onclick="event.stopPropagation(); updateStatus(${m.id}, 'Accepted', ${m.productId})" class="btn-premium btn-premium-indigo py-2 px-6 text-sm text-white font-bold">Accept</button>
                                    ` : m.status === 'Requested' && !isIncoming ? `
                                        <button onclick="event.stopPropagation(); window.location.href='/product/${m.productId}?match_id=${m.id}'" class="btn-premium btn-premium-indigo py-2 px-6 text-sm text-white font-bold">View Details &amp; Chat</button>
                                    ` : m.status === 'Accepted' ? `
                                        <button onclick="event.stopPropagation(); window.location.href='/product/${m.productId}?match_id=${m.id}'" class="btn-premium btn-premium-indigo py-2 px-6 text-sm flex items-center gap-2 text-white font-bold">
                                            Manage Details &amp; Chat
                                        </button>
                                        <button onclick="event.stopPropagation(); updateStatus(${m.id}, 'Cancelled', ${m.productId}, ${!isIncoming})" class="btn-premium btn-premium-rose py-2 px-4 text-sm text-white font-bold ml-auto">Cancel Request</button>
                                        ${isIncoming ? `<button onclick="event.stopPropagation(); window.location.href='/product/${m.productId}?match_id=${m.id}'" class="btn-premium btn-premium-emerald py-2 px-4 text-sm text-white font-bold">Mark Complete</button>` : ''}
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('');
                }

                document.getElementById('incoming-feed').innerHTML = renderCards(data.incoming, true);
                document.getElementById('outgoing-feed').innerHTML = renderCards(data.outgoing, false);
                
                // Animate current tab's cards
                window.animateFeedCards('.match-card', document.getElementById(currentTab === 'incoming' ? 'incoming-feed' : 'outgoing-feed'));
                
            } catch { showToast('Error loading matches', 'error'); }
        }

        function getStatusColor(status) {
            if(status === 'Accepted') return 'bg-green-50 text-green-700 border-green-200';
            if(status === 'Declined') return 'bg-red-50 text-red-700 border-red-200';
            if(status === 'Completed') return 'bg-slate-100 text-slate-600 border-slate-200';
            return 'bg-amber-50 text-amber-700 border-amber-200 shadow-[0_0_15px_rgba(251,191,36,0.2)]';
        }
    </script>
</body>
</html>
