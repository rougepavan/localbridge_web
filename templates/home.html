<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LocalBridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="/static/css/main.css" rel="stylesheet">
    <link href="/static/css/dashboard.css" rel="stylesheet">
    <link href="/static/css/premium-ui.css" rel="stylesheet">
</head>
<body class="mesh-bg">

    <div class="dashboard-layout">
        <!-- Premium Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <!-- Injected by sidebar.js -->
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
            </div>

            <nav class="sidebar-nav">
                <!-- Injected by sidebar.js -->
            </nav>

            <div style="padding: 1.5rem 1rem;">
                <button class="nav-item w-full sidebar-logout text-red-400 hover:text-red-300 hover:bg-red-500/10 justify-start border-none">
                    <!-- Injected by sidebar.js -->
                </button>
            </div>
        </aside>

        <!-- Main Content Layout -->
        <main class="main-content">
            
            <!-- Glass Navbar -->
            <header class="top-navbar">
                <button class="md:hidden icon-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>

                <div class="search-bar hidden md:flex">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInputDesktop" placeholder="Search for items, categories..." oninput="handleSearch(this.value)">
                </div>

                <div class="nav-actions">
                    <button onclick="toggleFilterModal()" class="icon-btn magnetic-btn hover:bg-indigo-50 transition-colors" title="Filter Products">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                    </button>
                    
                    <div class="user-profile-btn" id="profileMenuBtn">
                        <img src="" onerror="this.src='https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff'" id="navAvatar" class="user-avatar" alt="Avatar">
                            <span class="user-name" id="navName"></span>
                    </div>
                </div>
            </header>

            <!-- Scrollable Page Content -->
            <div class="content-area" id="contentArea">
                <div class="flex justify-between items-end mb-6 reveal-fade">
                    <div>
                        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight lg:text-4xl">Discover</h1>
                        <p class="text-slate-500 mt-2 text-lg">Local items ready for exchange within your loop.</p>
                    </div>
                </div>

                <!-- Mobile Search -->
                <div class="md:hidden mb-6 reveal-fade">
                    <div class="search-bar flex w-full">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="searchInputMobile" class="w-full" placeholder="Search for items..." oninput="handleSearch(this.value)">
                    </div>
                </div>

                <!-- Category Tabs -->
                <div class="flex flex-wrap gap-2 mb-8 reveal-fade" id="categoryTabs">
                    <button class="category-tab active px-5 py-2 rounded-full border border-indigo-200 bg-indigo-50 text-indigo-700 font-semibold text-sm shadow-sm transition-all" onclick="filterFeed('All', this)">All Items</button>
                    <button class="category-tab px-5 py-2 rounded-full border border-slate-200 text-slate-600 bg-white font-semibold text-sm hover:bg-slate-50 transition-all" onclick="filterFeed('Food', this)">Food</button>
                    <button class="category-tab px-5 py-2 rounded-full border border-slate-200 text-slate-600 bg-white font-semibold text-sm hover:bg-slate-50 transition-all" onclick="filterFeed('Powders', this)">Powders</button>
                    <button class="category-tab px-5 py-2 rounded-full border border-slate-200 text-slate-600 bg-white font-semibold text-sm hover:bg-slate-50 transition-all" onclick="filterFeed('Spices', this)">Spices</button>
                    <button class="category-tab px-5 py-2 rounded-full border border-slate-200 text-slate-600 bg-white font-semibold text-sm hover:bg-slate-50 transition-all" onclick="filterFeed('Liquids', this)">Liquids</button>
                </div>

                <!-- Feed Grid -->
                <div id="feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Cards injected via JS -->
                </div>
            </div>
        </main>
    </div>


    <!-- Filter Modal Wrapper -->
    <div id="filterModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl p-6">
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                <h3 class="text-xl font-bold text-slate-800">Filter Items</h3>
                <button onclick="toggleFilterModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <form id="filterForm" onsubmit="applyFilter(event)" class="space-y-5">
                <div class="form-group">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Product Category</label>
                    <select id="filterCategory" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                        <option value="All">All Categories</option>
                        <option value="Food">Food</option>
                        <option value="Powders">Powders</option>
                        <option value="Spices">Spices</option>
                        <option value="Liquids">Liquids</option>
                        <option value="Others">Others</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Distance</label>
                    <select id="filterDistance" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                        <option value="Any">Any Distance</option>
                        <option value="5">Under 5 km</option>
                        <option value="10">Under 10 km</option>
                        <option value="25">Under 25 km</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Condition</label>
                    <select id="filterCondition" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                        <option value="Any">Any Condition</option>
                        <option value="Brand New">Brand New</option>
                        <option value="Like New">Like New</option>
                        <option value="Used/Good">Used / Good</option>
                    </select>
                </div>

                <div class="pt-4 border-t border-slate-100 flex gap-3">
                    <button type="button" onclick="resetFilter()" class="flex-1 py-3 text-sm font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors">Reset</button>
                    <button type="submit" id="applyFilterBtn" class="flex-1 btn-premium btn-premium-indigo py-3 text-sm rounded-xl text-white font-bold">Apply Filters</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/animations.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            AppState.requireAuth();
            loadFeed();
        });

        async function loadFeed() {
            try {
                const feed = document.getElementById('feed');
                feed.innerHTML = `
                    <div class="col-span-full py-20 flex justify-center">
                        <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
                    </div>
                `;
                
                const user = AppState.getUser();
                const userEmail = user ? user.email : '';
                
                const coords = await AppState.getLocation();
                let url = `/products?email=${encodeURIComponent(userEmail)}`;
                if (coords) url += `&lat=${coords.lat}&lng=${coords.lng}`;
                
                const response = await fetch(url);
                window.allProducts = await response.json();
                
                renderFeed(window.allProducts);
            } catch (err) {
                console.error(err);
                showToast('Failed to load feed', 'error');
            }
        }
        
        function toggleFilterModal() {
            const m = document.getElementById('filterModal');
            m.classList.toggle('hidden');
        }

        async function applyFilter(e) {
            e.preventDefault();
            const btn = document.getElementById('applyFilterBtn');
            const orig = btn.innerText;
            btn.innerText = 'Applying...';
            
            const cat = document.getElementById('filterCategory').value;
            const dist = document.getElementById('filterDistance').value;
            const cond = document.getElementById('filterCondition').value;
            
            try {
                const user = AppState.getUser();
                const userEmail = user ? user.email : '';
                const coords = await AppState.getLocation();
                
                let url = `/filter_products?category=${encodeURIComponent(cat)}&distance=${encodeURIComponent(dist)}&condition=${encodeURIComponent(cond)}&email=${encodeURIComponent(userEmail)}`;
                if (coords) url += `&lat=${coords.lat}&lng=${coords.lng}`;
                
                const res = await fetch(url);
                const data = await res.json();
                
                window.allProducts = data; // replace tracking
                renderFeed(window.allProducts);
                
                toggleFilterModal();
                showToast('Filters applied!', 'success');
                
                // Reset category tabs to 'All' visual state since advanced filter is active
                document.querySelectorAll('.category-tab').forEach(b => {
                    b.classList.remove('bg-indigo-50', 'text-indigo-700', 'border-indigo-200', 'shadow-sm', 'active');
                    b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
                });
                
            } catch (err) {
                showToast('Filter failed', 'error');
            } finally {
                btn.innerText = orig;
            }
        }

        function resetFilter() {
            document.getElementById('filterCategory').value = 'All';
            document.getElementById('filterDistance').value = 'Any';
            document.getElementById('filterCondition').value = 'Any';
            loadFeed();
            toggleFilterModal();
        }

        function filterFeed(category, btnElement) {
            // Update active state on buttons
            document.querySelectorAll('.category-tab').forEach(b => {
                b.classList.remove('bg-indigo-50', 'text-indigo-700', 'border-indigo-200', 'shadow-sm', 'active');
                b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
            });
            if(btnElement) {
                btnElement.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-200', 'shadow-sm', 'active');
                btnElement.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
            }

            if (!window.allProducts) return;
            
            // Clear search when switching categories
            document.getElementById('searchInputDesktop').value = '';
            document.getElementById('searchInputMobile').value = '';

            if (category === 'All') {
                renderFeed(window.allProducts);
            } else {
                renderFeed(window.allProducts.filter(p => p.category === category));
            }
        }

        function handleSearch(query) {
            if (!window.allProducts) return;
            
            // Sync both search bars
            document.getElementById('searchInputDesktop').value = query;
            document.getElementById('searchInputMobile').value = query;

            const q = query.toLowerCase().trim();
            if (!q) {
                renderFeed(window.allProducts);
                return;
            }

            const filtered = window.allProducts.filter(p => 
                p.name.toLowerCase().includes(q) || 
                p.category.toLowerCase().includes(q) ||
                (p.description && p.description.toLowerCase().includes(q))
            );
            
            renderFeed(filtered);

            // Reset category tabs to 'All' visual state
            document.querySelectorAll('.category-tab').forEach((b, idx) => {
                if(idx === 0) {
                    b.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-200', 'shadow-sm', 'active');
                    b.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
                } else {
                    b.classList.remove('bg-indigo-50', 'text-indigo-700', 'border-indigo-200', 'shadow-sm', 'active');
                    b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
                }
            });
        }

        function renderFeed(products) {
            const feed = document.getElementById('feed');
            if (!products || products.length === 0) {
                feed.innerHTML = `
                    <div class="col-span-full premium-empty-state reveal-scale">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" class="mb-4"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                        <h3 class="text-xl font-bold text-slate-800">No items found</h3>
                        <p class="mt-2 text-slate-500">Try checking another category or come back later!</p>
                        <button onclick="filterFeed('All', document.querySelector('.category-tab'))" class="mt-6 btn-premium btn-premium-indigo text-sm py-2 px-6 text-white font-bold">View All Items</button>
                    </div>
                `;
                return;
            }

            console.log("Rendering products:", products);
            const user = AppState.getUser();
            const currentUserId = user ? user.email : null; 
                
                feed.innerHTML = products.map(p => {
                    console.log("Processing item:", p.id, p);
                    // Force rigorous sanitization of image name and avatar to prevent broken html rendering
                    const rawImage = String(p.image_name || '').replace(/[\r\n\t]+/g, "").trim();
                    const rawAvatar = String(p.userAvatar || '').replace(/[\r\n\t]+/g, "").trim();
                    const safeImageSrc = rawImage ? `/static/uploads/${rawImage}` : 'https://placehold.co/400x300/e2e8f0/64748b?text=No+Image';
                    const safeAvatarSrc = rawAvatar ? `/static/uploads/${rawAvatar}` : `https://ui-avatars.com/api/?name=${p.user_name}`;

                    return `
                    <div class="feed-card">
                        <div class="feed-card-header">
                            <img src="${safeAvatarSrc}" class="w-10 h-10 rounded-full object-cover shadow-sm" onerror="this.src='https://ui-avatars.com/api/?name=${p.user_name}'">
                            <div class="leading-tight">
                                <div class="font-semibold text-slate-900 text-sm">${p.user_name}</div>
                                <div class="text-xs text-slate-500">${p.distance.toFixed(1)} km away</div>
                            </div>
                        </div>
                        <img src="${safeImageSrc}" alt="${p.name}" class="feed-card-image" onerror="this.src='https://placehold.co/400x300/e2e8f0/64748b?text=Image+Not+Found'">
                        <div class="feed-card-body">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-lg text-slate-900 line-clamp-1">${p.name}</h3>
                                <div class="flex flex-col items-end">
                                    <span class="bg-indigo-50 text-indigo-700 font-semibold text-xs px-2.5 py-1 rounded-full border border-indigo-100">${p.category}</span>
                                    ${p.quantity ? `<span class="text-[10px] text-slate-400 mt-1 font-bold">${p.quantity} ${p.unit || ''}</span>` : ''}
                                </div>
                            </div>
                            <p class="text-slate-600 text-sm line-clamp-2 mb-4 leading-relaxed">${p.description}</p>
                            
                            <div class="badge-ai mb-5">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 3l1.912 5.886L20 10l-6.088 1.114L12 17l-1.912-5.886L4 10l6.088-1.114z"/>
                                </svg>
                                <span>${p.ai_insight || 'AI Verified Quality Item'}</span>
                            </div>

                            ${p.ownerEmail !== currentUserId ? 
                                (p.isRequested ? 
                                    `<button disabled class="w-full py-2.5 text-sm font-semibold text-slate-400 border border-slate-200 rounded-xl bg-slate-50">Already Requested</button>`
                                    :
                                    `<a href="/make-offer?id=${p.id}" class="w-full btn-premium btn-premium-indigo py-2.5 text-sm text-center block text-white font-bold">Make an Offer</a>`
                                )
                                : 
                                `<div class="w-full text-center py-2.5 text-sm font-semibold text-slate-400 border border-slate-200 rounded-xl bg-slate-50">Your Item</div>`
                            }
                        </div>
                    </div>
                `}).join('');

                // Trigger GSAP Stagger Reveal
                if (window.animateFeedCards) {
                    window.animateFeedCards('.feed-card');
                }
        }
    </script>
</body>
</html>
