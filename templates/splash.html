<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalBridge</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="/static/css/main.css" rel="stylesheet">
    <style>
      .splash-bg {
        background: linear-gradient(135deg, #09090b 0%, #1e1b4b 100%);
        min-height: 100dvh;
        width: 100vw;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      
      .particle {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.3;
      }

      .splash-logo {
        width: 120px;
        height: 120px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 50px rgba(79, 70, 229, 0.3);
      }
      
      .logo-icon {
        width: 60px;
        height: 60px;
        color: white;
      }

      .splash-text {
        font-size: 2.5rem;
        font-weight: 800;
        color: white;
        margin-top: 2rem;
        letter-spacing: -0.04em;
        text-align: center;
      }

      .splash-tagline {
        color: #94a3b8;
        font-size: 1.125rem;
        margin-top: 0.5rem;
        text-align: center;
      }

      .progress-container {
        width: 200px;
        height: 2px;
        background: rgba(255,255,255,0.1);
        margin-top: 3rem;
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #4f46e5, #ec4899);
      }
    </style>
</head>
<body class="splash-bg">

    <!-- Dynamic Particles Container -->
    <div id="particles" class="absolute inset-0 pointer-events-none"></div>

    <div class="z-10 flex flex-col items-center justify-center">
        <div class="splash-logo" id="logoObj">
            <img class="logo-icon" src="/logo.png" alt="LocalBridge Logo">
        </div>
        <div id="textItems">
            <h1 class="splash-text">LocalBridge</h1>
            <p class="splash-tagline">Premium local exchanges</p>
        </div>
        
        <div class="progress-container reveal-fade">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Fail-safe redirect: if GSAP fails, ensure we still move on after 3.5s
            setTimeout(() => {
                window.location.href = '/auth-choice';
            }, 3500);

            // Generate subtle CSS particles
            const pContainer = document.getElementById('particles');
            for(let i = 0; i < 40; i++) {
                let p = document.createElement('div');
                p.classList.add('particle');
                p.style.width = Math.random() * 4 + 'px';
                p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                pContainer.appendChild(p);
                
                // Slow orbit via GSAP
                if(window.gsap) {
                    gsap.to(p, {
                        y: `-${Math.random() * 100 + 50}`,
                        x: `+=${Math.random() * 60 - 30}`,
                        opacity: 0,
                        duration: Math.random() * 5 + 3,
                        repeat: -1,
                        ease: "none",
                        delay: Math.random() * 2
                    });
                }
            }

            if(window.gsap) {
                // Cinematic Main Timeline
                const tl = gsap.timeline({
                    onComplete: () => {
                        setTimeout(() => window.location.href = '/auth-choice', 400);
                    }
                });

                tl.from("#logoObj", { scale: 0, opacity: 0, rotation: 45, duration: 1.2, ease: "elastic.out(1, 0.5)" })
                  .from("#logoObj", { boxShadow: "0 0 0px rgba(79,70,229,0)", duration: 1 })
                  .from("#textItems h1", { y: 20, opacity: 0, duration: 0.8, ease: "power3.out" }, "-=0.6")
                  .from("#textItems p", { y: 15, opacity: 0, duration: 0.6, ease: "power3.out" }, "-=0.4")
                  .to("#progressBar", { width: "100%", duration: 1.5, ease: "power2.inOut" }, "-=0.2");
            }
        });
    </script>
</body>
</html>
